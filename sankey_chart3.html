<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Retirement Cash Flow - Sankey (ECharts)</title>

    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 18px;
        }

        h2 {
            text-align: center;
            margin: 6px 0 14px;
        }

        #chart {
            width: 100%;
            height: 640px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body>
    <h2>Retirement Cash Flow</h2>
    <div id="chart"></div>

    <script>
        // --- your year-calcs object (trimmed to fields used by this prototype) ---
        const c = {
                "year": 2035,
                "demographics_subjectAge": "70",
                "demographics_partnerAge": "66",
                "demographics_filingStatus": "Married Filing Jointly",
                "projectedSpend": 112427,
                "takeHome": 112427,
                "actualSpend": 112427,
                "spending_shortfall": 0,
                "spending_surplus": 0,
                "spending_basis": 100000,
                "spending_taper_rate": 0.01,
                "income_subjectGrossWages": 0,
                "income_subject401kContribution": 0,
                "income_subjectPayrollDeductions": 0,
                "withholdings_subjectWages": 0,
                "income_subjectTakehomeWages": 0,
                "income_partnerGrossWages": 0,
                "income_partner401kContribution": 0,
                "income_partnerPayrollDeductions": 0,
                "withholdings_partnerWages": 0,
                "income_partnerTakehomeWages": 0,
                "income_subjectSsGross": 37445,
                "withholdings_subjectSs": 7489,
                "income_subjectSsTakehome": 29956,
                "income_partnerSsGross": 14968,
                "withholdings_partnerSs": 2994,
                "income_partnerSsTakehome": 11974,
                "income_combinedSsGross": 52413,
                "income_combinedSsTakehome": 41930,
                "income_subject401kGross": 13730,
                "withholdings_subject401k": 2471,
                "income_subject401kTakehome": 11259,
                "income_partner401kGross": 3993,
                "withholdings_partner401k": 719,
                "income_partner401kTakehome": 3274,
                "income_combined401kGross": 17723,
                "income_combined401kTakehome": 14533,
                "income_miscTaxableIncomeGross": 0,
                "withholdings_miscTaxableIncome": 0,
                "income_miscTaxableIncomeTakehome": 0,
                "income_savingsInterest": null,
                "income_subjectPensionGross": 43260,
                "withholdings_subjectPension": 6891,
                "income_subjectPensionTakehome": 36369,
                "income_partnerPensionGross": 6360,
                "withholdings_partnerPension": 954,
                "income_partnerPensionTakehome": 5406,
                "income_combinedPensionGross": 49620,
                "income_combinedPensionTakehome": 41775,
                "income_total_gross": 134255,
                "income_total_takehome": 112427,
                "taxes_grossIncome": 134255,
                "taxes_adjustedGrossIncome": 126393,
                "taxes_standardDeduction": 37378,
                "taxes_taxableIncome": 89015,
                "withholdings_total": 21518,
                "taxes_federalIncomeTaxOwed": 10071,
                "taxes_overPayment": 11447,
                "taxes_underPayment": 0,
                "ss_subjectTaxable": 31809,
                "ss_subjectSsNonTaxable": 5636,
                "ss_partnerTaxable": 12742,
                "ss_partnerSsNonTaxable": 2226,
                "ss_NonSsTaxableIncome": 81842,
                "ss_totalSsTaxable": 44551,
                "ss_totalSsNonTaxable": 7862,
                "ss_provisionalIncome": 108049,
                "ss_threshold1": 32000,
                "ss_threshold2": 44000,
                "ss_nonSocialSecurityTaxableIncome": 81842,
                "ss_tier1TaxableAmount": 6000,
                "ss_tier2TaxableAmount": 54442,
                "account_savingsYearBeginBalance": 484359,
                "account_savingsWithdrawals": 14189,
                "account_savingsDeposits": 25946,
                "account_savingsYearEndBalance": 496116,
                "account_subject401kOpenBalance": 468719,
                "account_subject401kWithdrawals": 13730,
                "account_subject401kDeposits": 14031,
                "account_subject401kBalance": 469020,
                "account_partner401kOpenBalance": 136316,
                "account_partner401kDeposits": 4080,
                "account_partner401kWithdrawals": 3993,
                "account_partner401kBalance": 136403,
                "account_subjectRothOpenBalance": 0,
                "account_subjectRothDeposits": 0,
                "account_subjectRothWithdrawals": 0,
                "account_subjectRothBalance": 0,
                "account_partnerRothOpenBalance": 0,
                "account_partnerRothDeposits": 0,
                "account_partnerRothWithdrawals": 0,
                "account_partnerRothBalance": 0,
                "account_savingsInterest": 14499,
                "account_subject401kInterest": 14031,
                "account_partner401kInterest": 4080,
                "account_subjectRothInterest": 0,
                "account_partnerRothInterest": 0,
                "withholdings_combined401k": 3190,
                "withholdings_combinedPension": 7845,
                "withholdings_combinedSs": 10483,
                "withholdings_combinedWages": 0
            };

        const chart = echarts.init(document.getElementById("chart"));

        // --- helpers: include only positive-value links; nodes auto-derived from links ---
        const links = [];
        const nodes = new Map(); // name -> { name, depth }

        const num = (v) => (v == null ? 0 : Number(v));
        const pos = (v) => Math.max(0, Math.round(num(v) * 100) / 100);

        const addNode = (name, depth) => {
            if (!nodes.has(name)) nodes.set(name, { name, depth });
        };

        // Depth is the "column" index. This is what keeps the diagram structured.
        const addLink = (target, source, value, sourceDepth, targetDepth) => {
            const v = pos(value);
            if (v <= 0) return;

            addNode(source, sourceDepth);
            addNode(target, targetDepth);
            links.push({ source, target, value: v });
        };

        // --- column / depth plan ---
        // 0 = Income Sources
        // 1 = Gross Income / Withholdings
        // 2 = Cash (Take-Home) / Taxes
        // 3 = Spending + reconciliation outputs

            const grossIncome = c.income_total_takehome - c.income_savingsInterest;

        // Income → Gross
            addLink("Cash", "Savings (Withdrawals)", c.account_savingsWithdrawals, 0, 1);
            addLink("Cash", "Pension", c.income_combinedPensionTakehome, 0, 1);
            addLink("Cash", "Social Security", c.income_combinedSsTakehome, 0, 1);
            addLink("Cash", "401k Withdrawals", c.income_combined401kTakehome, 0, 1);

            addLink("Projected Spending", "Cash", c.actualSpend, 1, 3);

            addLink("Withholdings", "Social Security", c.withholdings_combinedSs, 0, 1);
            addLink("Withholdings", "Pension", c.withholdings_combinedPension, 0, 1);
            addLink("Withholdings", "401k Withdrawals", c.withholdings_combined401k, 0, 1);

            // Savings Withdrawal → Cash
            addLink("Savings (Deposits)", "Savings Interest", c.account_savingsInterest, 2, 3);

            // Gross → Withholdings
            // addLink("Gross Income", "Withholdings", c.withholdings_total, 1, 2);

            // Gross → Cash
            // addLink("Cash", "Gross Income", c.income_total_takehome, 1, 2);

            addLink("Taxes Due", "Withholdings", c.taxes_federalIncomeTaxOwed, 1, 2);
            addLink("Federal Taxes Paid", "Taxes Due", c.taxes_federalIncomeTaxOwed, 2, 3);
            if (c.taxes_underPayment > 0) {
                addLink("Taxes", "Savings Withdrawals", c.taxes_underPayment, 0, 1);
            }
            if (c.taxes_overPayment > 0){
                addLink("Tax Refund", "Withholdings", c.taxes_overPayment, 1, 2);
                addLink("Savings (Deposits)", "Tax Refund", c.taxes_overPayment, 2,3);
            }

        // --- optional dev sanity log ---
        console.log("Nodes:", Array.from(nodes.values()));
        console.log("Links:", links);

        const option = {
            title: { text: `Year ${c.year}`, left: "center" },
            tooltip: {
                trigger: "item",
                triggerOn: "mousemove",
                formatter: (p) => {
                    if (p.dataType === "edge") {
                        const v = Number(p.data.value);
                        return `${p.data.source} → ${p.data.target}<br/><b>$${v.toLocaleString()}</b>`;
                    }
                    return `<b>${p.name}</b>`;
                }
            },
            series: [{
                type: "sankey",
                nodeAlign: "left",
                emphasis: { focus: "adjacency" },

                // IMPORTANT: nodes are derived from links, and each node includes a `depth`
                // which keeps the chart in your desired columns.
                data: Array.from(nodes.values()),
                links,

                lineStyle: { color: "gradient", curveness: 0.5 },
                label: { fontSize: 13 }
            }]
        };

        chart.setOption(option);
        window.addEventListener("resize", () => chart.resize());
    </script>
</body>

</html>

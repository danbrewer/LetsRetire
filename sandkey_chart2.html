        const chart = echarts.init(document.getElementById("chart"));

        // ---- helpers ----
        const num = (v) => (v == null ? 0 : Number(v));
        const pos = (v) => Math.max(0, Math.round(num(v) * 100) / 100);

        const links = [];
        const nodes = new Set();

        const addNode = (name) => nodes.add(name);
        const addLink = (source, target, value) => {
            const v = pos(value);
            if (v > 0) {
                addNode(source);
                addNode(target);
                links.push({ source, target, value: v });
            }
        };

        // ---- node names ----
        const N = {
            ss: "Social Security (Gross)",
            pension: "Pension (Gross)",
            k401: "401k Withdrawals (Gross)",
            savingsW: "Savings Withdrawals",
            interest: "Savings Interest",

            gross: "Gross Income",
            withhold: "Withholdings",
            taxesOwed: "Taxes Owed (Federal)",
            refund: "Refund",
            underpay: "Underpayment",

            cash: "Cash (Take-Home)",
            spending: "Spending",
            surplus: "Surplus"
        };

        // ---- sources -> gross income ----
        addLink(N.ss, N.gross, c.income_combinedSsGross);
        addLink(N.pension, N.gross, c.income_combinedPensionGross);
        addLink(N.k401, N.gross, c.income_combined401kGross);
        addLink(N.savingsW, N.gross, c.account_savingsWithdrawals);
        addLink(N.interest, N.gross, c.account_savingsInterest);

        // ---- gross -> withholdings + cash ----
        // Withholdings: cash withheld during the year
        addLink(N.gross, N.withhold, c.withholdings_total);

        // Cash (take-home) is after withholdings per your model
        addLink(N.gross, N.cash, c.income_total_takehome);

        // ---- withholdings -> taxes owed + refund/underpay reconciliation ----
        addLink(N.withhold, N.taxesOwed, c.taxes_federalIncomeTaxOwed);
        addLink(N.withhold, N.refund, c.taxes_overPayment);
        addLink(N.withhold, N.underpay, c.taxes_underPayment);

        // ---- cash -> spending (+ surplus if any) ----
        addLink(N.cash, N.spending, c.actualSpend);
        addLink(N.cash, N.surplus, c.spending_surplus);

        // ---- optional sanity check (helpful during dev) ----
        // In your model these should line up:
        // withholdings_total ≈ taxes_owed + refund - underpay  (depending on sign conventions)
        // We won't block rendering if it doesn't.
        const w = pos(c.withholdings_total);
        const owed = pos(c.taxes_federalIncomeTaxOwed);
        const ref = pos(c.taxes_overPayment);
        const under = pos(c.taxes_underPayment);
        const recon = pos(owed + ref + under);
        console.log("Withholdings:", w, "Reconcile (owed+refund+underpay):", recon);

        const option = {
            title: { text: `Year: ${c.year}`, left: "center" },
            tooltip: {
                trigger: "item",
                triggerOn: "mousemove",
                formatter: (p) => {
                    if (p.dataType === "edge") {
                        return `${p.data.source} → ${p.data.target}<br/><b>${Number(p.data.value).toLocaleString()}</b>`;
                    }
                    return `<b>${p.name}</b>`;
                }
            },
            series: [{
                type: "sankey",
                nodeAlign: "left",
                emphasis: { focus: "adjacency" },
                data: Array.from(nodes).map(name => ({ name })),
                links,
                lineStyle: { color: "gradient", curveness: 0.5 },
                label: { fontSize: 13 }
            }]
        };

        chart.setOption(option);
        window.addEventListener("resize", () => chart.resize());
    </script>

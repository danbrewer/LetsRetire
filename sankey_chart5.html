<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Retirement Cash Flow</title>

    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 18px;
        }

        h2 {
            text-align: center;
        }

        #chart {
            width: 100%;
            height: 700px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body>

    <h2>Retirement Cash Flow</h2>

    <div id="chart"></div>

    <script>

        // --------------------------------------------------
        // SOURCE DATA
        // --------------------------------------------------

        const c = {
            year: 2035,
            income_combinedSsTakehome: 41930,
            income_combinedPensionTakehome: 41775,
            income_combined401kTakehome: 14533,

            withholdings_combinedSs: 10483,
            withholdings_combinedPension: 7845,
            withholdings_combined401k: 3190,

            account_savingsWithdrawals: 14189,
            account_savingsInterest: 14499,
            account_savingsDeposits: 25946,

            income_total_takehome: 112427,
            withholdings_total: 21518,

            taxes_federalIncomeTaxOwed: 10071,
            taxes_overPayment: 11447,

            actualSpend: 112427,
            spending_surplus: 0
        };


        // --------------------------------------------------
        // LINK + NODE BUILDERS
        // --------------------------------------------------

        const links = [];
        const nodes = new Map();

        const num = (v) => (v == null ? 0 : Number(v));
        const pos = (v) => Math.max(0, Math.round(num(v) * 100) / 100);

        const addNode = (name) => {
            if (!nodes.has(name)) {
                nodes.set(name, { name });
            }
        };

        const addLink = (target, source, value) => {

            const v = pos(value);
            if (v <= 0) return;

            addNode(source);
            addNode(target);

            links.push({
                source,
                target,
                value: v
            });
        };


        // --------------------------------------------------
        // FLOWS
        // --------------------------------------------------

        addLink("Cash", "Pension", c.income_combinedPensionTakehome);
        addLink("Cash", "Social Security", c.income_combinedSsTakehome);
        addLink("Cash", "401k Withdrawals", c.income_combined401kTakehome);

        addLink("Spending", "Cash", c.actualSpend);

        addLink("Withholdings", "Social Security", c.withholdings_combinedSs);
        addLink("Withholdings", "Pension", c.withholdings_combinedPension);
        addLink("Withholdings", "401k Withdrawals", c.withholdings_combined401k);

        addLink("Cash", "Savings Withdrawals", c.account_savingsWithdrawals);

        addLink("Savings", "Savings Interest", c.account_savingsInterest);

        addLink("Taxes", "Withholdings", c.withholdings_total);

        addLink("Taxes Paid (Federal)", "Taxes", c.taxes_federalIncomeTaxOwed);

        addLink("Surplus", "Cash", c.spending_surplus);

        addLink("Refund", "Taxes", c.taxes_overPayment);
        addLink("Savings", "Refund", c.taxes_overPayment);


        // --------------------------------------------------
        // CHART
        // --------------------------------------------------

        const chart = echarts.init(document.getElementById("chart"));

        const option = {

            title: {
                text: `Year ${c.year}`,
                left: "center"
            },

            tooltip: {
                trigger: "item",
                formatter: (p) => {

                    if (p.dataType === "edge") {
                        return `${p.data.source} → ${p.data.target}<br><b>$${p.data.value.toLocaleString()}</b>`;
                    }

                    return `<b>${p.name}</b>`;
                }
            },

            series: [{
                type: "sankey",

                nodeAlign: "left",

                nodeWidth: 22,
                nodeGap: 16,

                data: Array.from(nodes.values()),
                links: links,

                lineStyle: {
                    color: "gradient",
                    curveness: 0.45
                },

                label: {
                    fontSize: 13
                }
            }]

        };

        chart.setOption(option);

        window.addEventListener("resize", () => chart.resize());

    </script>

</body>

</html>

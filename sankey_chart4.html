<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Retirement Cash Flow - Clean Sankey (ECharts)</title>

    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 18px;
        }

        h1,
        h2 {
            text-align: center;
            margin: 6px 0 10px;
        }

        #chart {
            width: 100%;
            height: 680px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .note {
            max-width: 1100px;
            margin: 10px auto 0;
            color: #555;
            font-size: 13px;
            line-height: 1.35;
        }

        code {
            background: #f3f3f3;
            padding: 1px 4px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <h1>Retirement Cash Flow</h1>
    <h2 id="subtitle"></h2>
    <div id="chart"></div>
    <div class="note">
        This version is a “Net Cash Statement” Sankey: <b>Sources → Cash Pool → Uses</b>.
        It avoids tax reconciliation detours (refund/underpay) and focuses on what people care about:
        <b>where cash came from</b> and <b>where cash went</b>.
    </div>

    <script>
        // --- Example year snapshot (use your real year object here) ---
        // Note: This diagram uses TAKE-HOME amounts for income sources because it is "cash pool" focused.
        const c = {
            year: 2035,

            // Cash sources (prefer take-home)
            income_combinedSsTakehome: 41930,
            income_combinedPensionTakehome: 41775,
            income_combined401kTakehome: 14533,

            // Non-income cash injections
            account_savingsWithdrawals: 14189,

            // Interest is cash that increases savings; whether you show it as cash depends on your interpretation.
            // We'll treat it as cash entering the pool for visualization simplicity.
            account_savingsInterest: 14499,

            // Uses
            actualSpend: 112427,

            // Taxes paid as cash outflow (pick the measure you want viewers to interpret as "cash left your hands")
            // Common options:
            // - taxes_federalIncomeTaxOwed (true liability, not necessarily paid this year)
            // - withholdings_total (cash withheld during the year)
            // We'll use withholdings_total as "tax cash out" for this view.
            withholdings_total: 21518,

            // Savings deposits (cash you set aside / net add to savings from cash)
            account_savingsDeposits: 25946
        };

        document.getElementById("subtitle").textContent = `Year ${c.year}`;

        const chart = echarts.init(document.getElementById("chart"));

        // --- helpers: only include positive flows; nodes are derived from links ---
        const links = [];
        const nodes = new Map(); // name -> { name, depth }

        const num = (v) => (v == null ? 0 : Number(v));
        const pos = (v) => Math.max(0, Math.round(num(v) * 100) / 100);

        const addNode = (name, depth) => {
            if (!nodes.has(name)) nodes.set(name, { name, depth });
        };

        const addLink = (source, target, value, sourceDepth, targetDepth) => {
            const v = pos(value);
            if (v <= 0) return;
            addNode(source, sourceDepth);
            addNode(target, targetDepth);
            links.push({ source, target, value: v });
        };

        // --- Layout plan ---
        // 0 = Sources (cash inflows)
        // 1 = Cash Pool
        // 2 = Uses of Cash
        //
        // This is intentionally simple and stable.

        // SOURCES → CASH POOL (use take-home amounts)
        addLink("Social Security (Net)", "Spending", c.income_combinedSsTakehome, 0, 1);
        addLink("Pension (Net)", "Spending", c.income_combinedPensionTakehome, 0, 1);
        addLink("401k Withdrawals (Net)", "Spending", c.income_combined401kTakehome, 0, 1);

        // Not income; cash injection from assets
        addLink("Savings Withdrawals", "Spending", c.account_savingsWithdrawals, 0, 1);

        // Interest: optional interpretation.
        // If you'd rather show it as "Savings Interest → Savings" (instead of entering Cash), change target to "Savings".
        addLink("Savings Interest", "Cash", c.account_savingsInterest, 0, 1);

        // CASH POOL → USES
        addLink("Cash", "Spending", c.actualSpend, 1, 2);

        // Taxes paid as a cash outflow. Here we used withholdings_total as "cash that left paychecks".
        // If you prefer "actual tax liability", swap to c.taxes_federalIncomeTaxOwed.
        addLink("Cash", "Taxes Paid (Federal)", c.withholdings_total, 1, 2);

        // Savings as a use of cash (money set aside / deposited)
        addLink("Cash", "Savings", c.account_savingsDeposits, 1, 2);

        const option = {
            title: { text: "", left: "center" },
            tooltip: {
                trigger: "item",
                triggerOn: "mousemove",
                formatter: (p) => {
                    if (p.dataType === "edge") {
                        const v = Number(p.data.value);
                        return `${p.data.source} → ${p.data.target}<br/><b>$${v.toLocaleString()}</b>`;
                    }
                    return `<b>${p.name}</b>`;
                }
            },
            series: [{
                type: "sankey",
                nodeAlign: "left",
                emphasis: { focus: "adjacency" },

                // spacing tweaks
                nodeGap: 18,
                nodeWidth: 22,

                data: Array.from(nodes.values()),
                links,

                lineStyle: { color: "gradient", curveness: 0.45 },
                label: { fontSize: 13 }
            }]
        };

        chart.setOption(option);
        window.addEventListener("resize", () => chart.resize());
    </script>
</body>

</html>

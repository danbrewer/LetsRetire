<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Retirement Cash Flow - Sankey</title>

    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fafafa;
        }

        #chart {
            width: 100%;
            height: 600px;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>

<body>

    <h2>2037 Retirement Cash Flow</h2>

    <div id="chart"></div>

    <script>

        const data2037 = {
            ssGross: 55066,
            pensionGross: 49620,
            k401Gross: 18050,

            ssWithhold: 11013,
            pensionWithhold: 7845,
            k401Withhold: 3249,

            netIncome: 115768,
            spending: 115768
        };

        const chart = echarts.init(document.getElementById("chart"));

        const option = {

            tooltip: {
                trigger: "item",
                triggerOn: "mousemove"
            },

            series: [
                {
                    type: "sankey",

                    nodeAlign: "left",

                    emphasis: {
                        focus: "adjacency"
                    },

                    data: [
                        { name: "Social Security" },
                        { name: "Pension" },
                        { name: "401k Withdrawals" },

                        { name: "SS Withholding" },
                        { name: "Pension Withholding" },
                        { name: "401k Withholding" },

                        { name: "Net Income" },
                        { name: "Spending" }
                    ],

                    links: [

                        { source: "Social Security", target: "SS Withholding", value: data2037.ssWithhold },
                        { source: "Social Security", target: "Net Income", value: data2037.ssGross - data2037.ssWithhold },

                        { source: "Pension", target: "Pension Withholding", value: data2037.pensionWithhold },
                        { source: "Pension", target: "Net Income", value: data2037.pensionGross - data2037.pensionWithhold },

                        { source: "401k Withdrawals", target: "401k Withholding", value: data2037.k401Withhold },
                        { source: "401k Withdrawals", target: "Net Income", value: data2037.k401Gross - data2037.k401Withhold },

                        { source: "Net Income", target: "Spending", value: data2037.spending }

                    ],

                    lineStyle: {
                        color: "gradient",
                        curveness: 0.5
                    },

                    label: {
                        fontSize: 14
                    }

                }
            ]
        };

        chart.setOption(option);

    </script>

</body>

</html>
